name: CI/CD - Deploy Backend

on:
  push:
    branches: [production]
    paths:
      - 'src/Services/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build Docker images and push to GitHub Container Registry
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push - ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: identity
            context: src/Services/Identity
          - name: friend
            context: src/Services/Friend
          - name: user
            context: src/Services/User
          - name: post
            context: src/Services/Post
          - name: message
            context: src/Services/Message

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name (lowercase)
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${{ env.REGISTRY }}/${OWNER}/socialnet-${{ matrix.service.name }}" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy to VM via SSH
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy compose files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Bỏ chữ Back_End/ đi vì file nằm ở thư mục gốc
          source: "docker-compose.yml,docker-compose.prod.yml" 
          target: "/opt/socialnet"
          # Đổi cái này thành 0 vì mình không cần bỏ qua thư mục cha nào cả
          strip_components: 0

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/socialnet

            # Normalize owner to lowercase for image names
            OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            IMAGE_TAG="${{ github.sha }}"

            # Write .env file with all secrets (overrides appsettings.json at runtime)
            cat > /opt/socialnet/.env << ENVEOF
            # ── Image ──────────────────────────────────────────────────────────
            IMAGE_OWNER=${OWNER}
            IMAGE_TAG=${IMAGE_TAG}

            # ── Database ───────────────────────────────────────────────────────
            DB_CONNECTION=${{ secrets.DB_CONNECTION }}
            MONGODB_CONNECTION=${{ secrets.MONGODB_CONNECTION }}

            # ── Auth ───────────────────────────────────────────────────────────
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}

            # ── External Services ──────────────────────────────────────────────
            BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
            APP_BASE_URL=http://${{ secrets.VM_HOST }}:5210
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            ENVEOF

            # Login to GHCR to pull private images
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Pull latest images
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env pull

            # Restart only changed containers (zero-downtime for unchanged ones)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env up -d --no-build --remove-orphans

            # Cleanup unused images to free disk space
            docker image prune -f

            echo "Deploy completed successfully!"
