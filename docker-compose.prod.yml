# Production override — used together with docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env up -d --no-build
#
# This file:
#   1. Replaces build context with pre-built GHCR images
#   2. Injects secrets from .env (overrides appsettings.json values at runtime)

services:

  identity:
    image: ghcr.io/${IMAGE_OWNER}/socialnet-identity:${IMAGE_TAG:-latest}
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION}
      Jwt__SecretKey: ${JWT_SECRET}
      Google__ClientId: ${GOOGLE_CLIENT_ID}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      Email__ApiKey: ${BREVO_API_KEY}
      App__BaseUrl: ${APP_BASE_URL}

  friend:
    image: ghcr.io/${IMAGE_OWNER}/socialnet-friend:${IMAGE_TAG:-latest}
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION}
      Jwt__SecretKey: ${JWT_SECRET}

  user:
    image: ghcr.io/${IMAGE_OWNER}/socialnet-user:${IMAGE_TAG:-latest}
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION}
      Jwt__SecretKey: ${JWT_SECRET}
      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET}

  post:
    image: ghcr.io/${IMAGE_OWNER}/socialnet-post:${IMAGE_TAG:-latest}
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION}
      Jwt__SecretKey: ${JWT_SECRET}
      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET}
      # AI viết caption (Groq API) — key giữ ở server, không lộ ra app
      Groq__ApiKey: ${GROQ_API_KEY}
      Groq__Model: ${GROQ_MODEL:-openai/gpt-oss-120b}

  message:
    image: ghcr.io/${IMAGE_OWNER}/socialnet-message:${IMAGE_TAG:-latest}
    environment:
      ConnectionStrings__MongoDB: ${MONGODB_CONNECTION}
      Jwt__Key: ${JWT_SECRET}
      Agora__AppId: ${AGORA_APP_ID}
      Agora__AppCertificate: ${AGORA_APP_CERTIFICATE}
      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET}

  notification:
    image: ghcr.io/${IMAGE_OWNER}/socialnet-notification:${IMAGE_TAG:-latest}
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION}
      # Notification service reads the JWT signing key from "Jwt:Key" (like Message)
      Jwt__Key: ${JWT_SECRET}
      # Firebase__CredentialsPath + the volume mount are inherited from docker-compose.yml.
      # Make sure ./secrets/fcm-service-account.json exists on the VM (see DEPLOYMENT guide).
