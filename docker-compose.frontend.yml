# Frontend Docker Compose Overlay
# Usage: docker-compose -f docker-compose.yml -f docker-compose.frontend.yml up -d

version: '3.8'

services:
  frontend:
    build:
      context: ../Front_End
      dockerfile: Dockerfile
    container_name: socialnetwork_frontend
    ports:
      - "5173:80"
    environment:
      API_BASE_URL: http://localhost:5210
      REACT_APP_API_URL: http://localhost:5210/api
      FLUTTER_WEB_API: http://localhost:5210
    depends_on:
      - identity-service
      - user-service
      - post-service
    networks:
      - socialnetwork
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  socialnetwork:
    driver: bridge
